{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex pl-24">
    
    <nav class="w-24 h-screen border-r border-stone-200 fixed left-0 top-0 bg-white flex flex-col items-center py-8 z-50 transition-colors duration-700" id="global-nav">
        
        <a href="/dashboard" class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-lg shadow-indigo-200 mb-8 hover:bg-indigo-700 hover:scale-105 transition-all">
            HQ
        </a>

        <div class="flex flex-col gap-4 w-full px-6">
            
            <a href="{{ url_for('dashboard.index') }}" class="w-12 h-12 mx-auto flex items-center justify-center rounded-xl transition-colors {% if '/dashboard' in request.path %}bg-indigo-50 text-indigo-600{% else %}text-stone-400 hover:bg-stone-50 hover:text-stone-600{% endif %}" title="Dashboard">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            </a>

            <a href="{{ url_for('braindumps_view.index') }}" class="w-12 h-12 mx-auto flex items-center justify-center rounded-xl transition-colors {% if '/inbox' in request.path %}bg-indigo-50 text-indigo-600{% else %}text-stone-400 hover:bg-stone-50 hover:text-stone-600{% endif %}" title="Inbox">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-6l-2 3h-4l-2-3H2"></path><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path></svg>
            </a>

            <a href="{{ url_for('focus_view.planner') }}" class="w-12 h-12 mx-auto flex items-center justify-center rounded-xl transition-colors {% if '/focus-planner' in request.path %}bg-indigo-50 text-indigo-600{% else %}text-stone-400 hover:bg-stone-50 hover:text-stone-600{% endif %}" title="Focus Planner">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            </a>

            <a href="{{ url_for('time_buckets_view.manage') }}" class="w-12 h-12 mx-auto flex items-center justify-center rounded-xl transition-colors {% if '/life' in request.path %}bg-indigo-50 text-indigo-600{% else %}text-stone-400 hover:bg-stone-50 hover:text-stone-600{% endif %}" title="Time Buckets">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
            </a>

        </div>

        <div class="flex-1"></div>

        <div class="w-full px-6 flex flex-col gap-4">
            <a href="{{ url_for('auth.logout') }}" class="w-12 h-12 mx-auto flex items-center justify-center rounded-xl text-stone-300 hover:bg-red-50 hover:text-red-600 transition-colors" title="Sign Out">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </a>
        </div>
    </nav>

    <main class="flex-1 w-full relative" id="main-content">
        {% block app_content %}{% endblock %}
    </main>

</div>
{% endblock %}
