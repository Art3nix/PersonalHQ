<!-- Unsaved Progress Warning Component -->
<script>
/**
 * Track unsaved changes and warn user before leaving page
 * Usage: trackUnsavedChanges(formSelector)
 */
function trackUnsavedChanges(formSelector = 'form') {
    let hasUnsavedChanges = false;
    const form = document.querySelector(formSelector);
    
    if (!form) return;
    
    // Mark as changed on input
    form.addEventListener('input', function() {
        hasUnsavedChanges = true;
    });
    
    // Mark as changed on select
    form.addEventListener('change', function() {
        hasUnsavedChanges = true;
    });
    
    // Mark as saved on submit
    form.addEventListener('submit', function() {
        hasUnsavedChanges = false;
    });
    
    // Warn before leaving page
    window.addEventListener('beforeunload', function(e) {
        if (hasUnsavedChanges) {
            e.preventDefault();
            e.returnValue = 'You have unsaved changes. Are you sure you want to leave?';
            return e.returnValue;
        }
    });
    
    // Allow navigation to internal links without warning
    document.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', function(e) {
            if (hasUnsavedChanges && !confirm('You have unsaved changes. Are you sure you want to leave?')) {
                e.preventDefault();
            }
        });
    });
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', function() {
    trackUnsavedChanges();
});
</script>

<style>
/* Visual indicator for unsaved changes */
.unsaved-indicator {
    display: inline-block;
    width: 8px;
    height: 8px;
    background-color: #e74c3c;
    border-radius: 50%;
    margin-left: 8px;
    animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% {
        opacity: 1;
    }
    50% {
        opacity: 0.5;
    }
}

/* Toast notification for unsaved changes */
.unsaved-toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: #fff3cd;
    border: 1px solid #ffc107;
    border-radius: 4px;
    padding: 12px 16px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    z-index: 1000;
    display: none;
}

.unsaved-toast.show {
    display: block;
    animation: slideIn 0.3s ease-out;
}

@keyframes slideIn {
    from {
        transform: translateX(400px);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}
</style>
