{% macro render_color_picker(input_name='color', selected_color='stone', label_text='Color') %}
    {% set colors = ['stone', 'rose', 'orange', 'amber', 'emerald', 'sky', 'indigo', 'violet'] %}
    
    <div>
        <label class="block text-xs font-bold text-stone-900 uppercase tracking-wider mb-3">{{ label_text }}</label>
        <div class="flex flex-wrap gap-3">
            {% for color in colors %}
            <label class="cursor-pointer relative">
                <input type="radio" name="{{ input_name }}" value="{{ color }}" class="peer sr-only" {% if color == selected_color %}checked{% endif %}>
                
                <div class="h-8 w-8 rounded-full bg-{{ color }}-500 border-2 border-transparent peer-checked:ring-2 peer-checked:ring-offset-2 peer-checked:ring-{{ color }}-500 transition-all hover:scale-110 shadow-sm"></div>
            </label>
            {% endfor %}
        </div>
    </div>
{% endmacro %}
