services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    command: gunicorn --reload --config gunicorn_config.py "personalhq:create_app()"
    environment:
      FLASK_CONFIG: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-personalhq}:${POSTGRES_PASSWORD:-personalhq}@db:5432/${POSTGRES_DB:-personalhq}
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/usr/src/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  tailwind:
    image: node:20-slim
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install --silent && npx tailwindcss -i personalhq/static/css/input.css -o personalhq/static/css/tailwind.css --watch"
    restart: no
  pgadmin:
    image: dpage/pgadmin4
    restart: no
    ports:
      - "8888:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    volumes:
      - pgadmin-data:/var/lib/pgadmin
volumes:
  postgres_data:
  pgadmin-data:
