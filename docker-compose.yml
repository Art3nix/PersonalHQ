services:
  db:
    image: postgres:15
    container_name: personalhq_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: personalhq_web
    restart: always
    command: gunicorn --reload --config gunicorn_config.py "personalhq:create_app()"
    env_file:
      - .env
    volumes:
      - .:/usr/src/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default
      - proxy-network

  ai_worker:
    build: .
    container_name: personalhq_worker
    env_file:
      - .env
    volumes:
      - .:/app
    command: python run_scheduler.py
    depends_on:
      - web

  pgadmin:
    image: dpage/pgadmin4
    container_name: personalhq_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - default
      - proxy-network

volumes:
  postgres_data:
  pgadmin-data:

networks:
  proxy-network:
    external: true
